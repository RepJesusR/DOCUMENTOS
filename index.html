<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Mis Documentos — UNIGIS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --red: #CC0000;
      --red-dark: #A30000;
      --teal: #00B5B5;
      --teal-dark: #008f8f;
      --teal-bg: #e6f7f7;
      --bg: #f2f4f7;
      --surface: #ffffff;
      --border: #e2e5eb;
      --text: #111827;
      --text-2: #4b5563;
      --muted: #9ca3af;
      --green: #16a34a;
      --green-bg: #dcfce7;
      --orange: #d97706;
      --orange-bg: #fef3c7;
      --red-bg: #fee2e2;
      --sans: 'Inter', sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --radius: 12px;
      --radius-sm: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; -webkit-font-smoothing: antialiased; }

    /* ── TOP BAR ── */
    .topbar {
      background: var(--red);
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-logo { font-size: 18px; font-weight: 600; color: #fff; letter-spacing: -0.02em; }
    .topbar-logo span { opacity: 0.6; font-weight: 300; }
    .topbar-tag {
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-size: 10px;
      font-family: var(--mono);
      padding: 2px 8px;
      border-radius: 3px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── ESTADO VIEWS ── */
    #view-loading, #view-error, #view-empty, #view-main { display: none; }
    #view-loading.active, #view-error.active, #view-empty.active, #view-main.active { display: block; }

    /* ── LOADING ── */
    #view-loading {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 52px);
      gap: 16px;
    }
    #view-loading.active { display: flex; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--muted); font-family: var(--mono); }

    /* ── ERROR / EMPTY ── */
    .state-card {
      max-width: 360px;
      margin: 80px auto 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 32px;
      text-align: center;
    }
    .state-icon { font-size: 40px; margin-bottom: 16px; }
    .state-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .state-sub { font-size: 13px; color: var(--text-2); line-height: 1.6; }

    /* ── MAIN ── */
    .container { max-width: 600px; margin: 0 auto; padding: 24px 16px 60px; }

    /* PERFIL */
    .profile-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }
    .avatar {
      width: 52px; height: 52px;
      background: var(--red);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #fff;
      font-weight: 600;
      flex-shrink: 0;
    }
    .profile-name { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
    .profile-doc { font-size: 12px; color: var(--muted); font-family: var(--mono); }

    /* SECCIÓN DOCUMENTOS */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
      padding-left: 4px;
    }

    .doc-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }

    .doc-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      transition: box-shadow 0.15s;
    }
    .doc-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

    .doc-type-icon {
      width: 40px; height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      background: var(--teal-bg);
    }

    .doc-info { flex: 1; min-width: 0; }
    .doc-tipo { font-size: 13px; font-weight: 500; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .doc-ref { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-bottom: 8px; }
    .doc-dates { display: flex; gap: 12px; flex-wrap: wrap; }
    .doc-date-item { font-size: 11px; color: var(--text-2); }
    .doc-date-item strong { color: var(--text); font-weight: 500; }

    .doc-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
      white-space: nowrap;
      align-self: flex-start;
