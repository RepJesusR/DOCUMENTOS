<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Documentos — UNIGIS</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #181c27;
      --border: #2a2f3e;
      --accent: #00c9a7;
      --accent2: #0077ff;
      --text: #e4e8f0;
      --muted: #6b7280;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 0;
    }

    /* Noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 60px 24px 80px;
      position: relative;
      z-index: 1;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 32px;
      margin-bottom: 48px;
    }

    .badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 3px 10px;
      border-radius: 2px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 10px;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      font-family: var(--mono);
    }

    /* Search */
    .search-wrap {
      margin-bottom: 32px;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 12px 16px 12px 42px;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus {
      border-color: var(--accent);
    }

    .search-wrap input::placeholder { color: var(--muted); }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 15px;
    }

    /* Table */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .table-header {
      display: grid;
      grid-template-columns: 1fr 110px 120px 70px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .doc-row {
      display: grid;
      grid-template-columns: 1fr 110px 120px 70px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      align-items: center;
      transition: background 0.15s;
      text-decoration: none;
      color: inherit;
    }

    .doc-row:last-child { border-bottom: none; }

    .doc-row:hover {
      background: rgba(0, 201, 167, 0.05);
    }

    .doc-name {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .doc-icon {
      width: 32px;
      height: 32px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .icon-pdf { background: rgba(255, 80, 80, 0.15); }
    .icon-doc { background: rgba(0, 119, 255, 0.15); }
    .icon-img { background: rgba(255, 200, 0, 0.12); }

    .doc-title {
      font-size: 14px;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .doc-title:hover { color: var(--accent); }

    .doc-type {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .doc-date {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }

    .doc-action a {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent2);
      text-decoration: none;
      border: 1px solid var(--accent2);
      padding: 4px 10px;
      border-radius: 3px;
      transition: background 0.15s, color 0.15s;
    }

    .doc-action a:hover {
      background: var(--accent2);
      color: #fff;
    }

    .empty {
      padding: 40px 20px;
      text-align: center;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted);
      display: none;
    }

    footer {
      margin-top: 48px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.05em;
    }

    footer span { color: var(--accent); }

    @media (max-width: 600px) {
      .table-header,
      .doc-row {
        grid-template-columns: 1fr 80px 60px;
      }
      .doc-date { display: none; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="badge">Repositorio de documentos</div>
    <h1>UNIGIS <span>/ Docs</span></h1>
    <p class="subtitle">Acceso a documentación técnica y operativa</p>
  </header>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar documento..." oninput="filterDocs()"/>
  </div>

  <div class="table-wrap">
    <div class="table-header">
      <div>Nombre</div>
      <div>Tipo</div>
      <div>Fecha</div>
      <div>Acción</div>
    </div>

    <div id="docList">
      <!-- EJEMPLO 1 -->
      <a class="doc-row" href="docs/protocolo-seguridad.pdf" target="_blank" data-name="protocolo seguridad">
        <div class="doc-name">
          <div class="doc-icon icon-pdf">📄</div>
          <span class="doc-title">Protocolo de Seguridad</span>
        </div>
        <div class="doc-type">PDF</div>
        <div class="doc-date">2025-06-01</div>
        <div class="doc-action"><a href="docs/protocolo-seguridad.pdf" target="_blank">Abrir</a></div>
      </a>

      <!-- EJEMPLO 2 -->
      <a class="doc-row" href="docs/manual-operaciones.pdf" target="_blank" data-name="manual operaciones">
        <div class="doc-name">
          <div class="doc-icon icon-pdf">📄</div>
          <span class="doc-title">Manual de Operaciones</span>
        </div>
        <div class="doc-type">PDF</div>
        <div class="doc-date">2025-05-20</div>
        <div class="doc-action"><a href="docs/manual-operaciones.pdf" target="_blank">Abrir</a></div>
      </a>
    </div>

    <div class="empty" id="emptyMsg">No se encontraron documentos.</div>
  </div>

  <footer>
    Repositorio público · <span>RepJesusR/DOCUMENTOS</span> · GitHub Pages
  </footer>

</div>

<script>
  function filterDocs() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const rows = document.querySelectorAll('.doc-row');
    let visible = 0;
    rows.forEach(row => {
      const name = row.getAttribute('data-name') || '';
      const show = name.includes(q);
      row.style.display = show ? '' : 'none';
      if (show) visible++;
    });
    document.getElementById('emptyMsg').style.display = visible === 0 ? 'block' : 'none';
  }
</script>
</body>
</html>
